apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshpredict-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: freshpredict
  template:
    metadata:
      labels:
        app: freshpredict
    spec:
      containers:
      - name: freshpredict-container
        image: your-docker-registry/freshpredict:latest
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: freshpredict-service
spec:
  selector:
    app: freshpredict
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: freshpredict-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: freshpredict.wur.nl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: freshpredict-service
            port:
              number: 80